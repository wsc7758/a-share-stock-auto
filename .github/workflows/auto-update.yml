name: Auto IPTV Merge 超清1080P筛选
on:
  schedule:
    - cron: "0 20 * * *" # 北京时间凌晨4点自动执行
  workflow_dispatch: # 支持手动一键运行

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 授予提交文件权限
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: 安装Python与解析依赖
        run: |
          python3 -m pip install requests m3u8
      - name: 执行超清筛选脚本(仅1080P/4K)
        run: python3 merge_speed.py
      - name: 自动提交更新tv.txt
        run: |
          git config --global user.name "Auto IPTV Bot"
          git config --global user.email "bot@github.com"
          git add tv.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "自动更新仅1080P/4K超清直播源" && git push)
