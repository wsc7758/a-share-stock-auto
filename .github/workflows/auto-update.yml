name: stream-sort-task
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  stream-sort-task:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装Python依赖
        run: |
          python3 -m pip install --upgrade pip
          pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          pip install requests m3u8

      # 测速步骤：新开独立子shell执行，子shell内exec彻底销毁全部IO
      - name: 测速生成临时文件（独立子shell+exec强制释放所有句柄）
        timeout-minutes: 10
        run: |
          # 新开()子shell，所有Python产生的进程、socket全部归属于这个子shell
          (
            PYTHONUNBUFFERED=1 python3 merge_speed.py
            cp tv.txt /tmp/tmp_tv_m3u.txt
            sync
            echo "测速完成，临时文件已写入/tmp"
            # 子shell内部exec替换进程，子shell直接退出，销毁全部后台socket
            exec true
          )
          # 子shell结束，主bash无任何遗留网络进程，步骤立刻完成
          echo "测速子shell已完全退出，无残留IO"

      - name: 读取临时文件并提交推送
        timeout-minutes: 1
        run: |
          set -eo pipefail
          sync
          cp /tmp/tmp_tv_m3u.txt tv.txt
          sync
          git config --global user.name "wsc7758"
          git config --global user.email "xxx@shturl."
          git add tv.txt
          if git diff --cached --quiet >/dev/null 2>&1; then
            echo "tv.txt无更新，任务正常完成"
            exit 0
          fi
          git fetch origin main
          git reset --hard origin/main
          git add tv.txt
          git commit -m "流水线自动更新｜优选流媒体列表"
          git push origin main
          echo "文件推送仓库成功"
