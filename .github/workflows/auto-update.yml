name: Auto IPTV Merge & Speed Test
on:
  schedule:
    - cron: "0 8 * * *" # 每天早8点自动拉取测速更新
  workflow_dispatch: # 支持手动点运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Python & requests
        run: |
          pip install requests
      - name: Run merge script
        run: python merge_speed.py
      - name: Commit & Push new tv.txt
        run: |
          git config --global user.name "Auto IPTV Bot"
          git config --global user.email "bot@github.com"
          git add tv.txt
          git commit -m "Auto update best iptv source"
          git push
