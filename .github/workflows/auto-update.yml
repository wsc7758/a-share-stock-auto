name: A股每日投研分析任务
on:
  schedule:
    # UTC时区 = 北京时间 -8小时
    # 周一至周五 北京时间09:25 盘前执行
    - cron: "25 1 * * 1-5"
    # 周一至周五 北京时间15:40 收盘执行
    - cron: "40 7 * * 1-5"
  workflow_dispatch: # 网页支持手动触发调试

jobs:
  run_task:
    runs-on: ubuntu-latest
    timeout-minutes: 28
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute stock analysis task
        run: python task/run_daily.py

      - name: Commit & Push result
        run: |
          git config --global user.name "StockBot"
          git config --global user.email "bot@stock.local"
          # 只跟踪输出结果文件夹，避免提交缓存文件
          git add output/ archive/ runtime/logs/
          if ! git diff --quiet --cached; then
            git commit -m "🤖 自动更新选股结果 $(date +%Y-%m-%d)"
            git push
          else
            echo "本次运行没有产生新数据，跳过提交"
          fi
