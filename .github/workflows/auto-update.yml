name: stream-sort-task
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  stream-sort-task:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装Python依赖
        run: |
          python3 -m pip install --upgrade pip
          pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          pip install requests m3u8

      - name: 测速生成临时文件（独立环境，无git阻塞）
        timeout-minutes: 10
        run: |
          PYTHONUNBUFFERED=1 python3 merge_speed.py
          # 关键：休眠2分钟，等待系统自动回收全部残留socket
          echo "测速完成，等待2分钟回收网络连接..."
          sleep 120
          cp tv.txt /tmp/tmp_tv_m3u.txt
          sync
          echo "临时文件写入完成，步骤正常退出"

      - name: 读取临时文件并提交推送
        timeout-minutes: 1
        run: |
          set -eo pipefail
          sync
          cp /tmp/tmp_tv_m3u.txt tv.txt
          sync
          git config --global user.name "wsc7758"
          git config --global user.email "xxx@shturl."
          git add tv.txt
          if git diff --cached --quiet >/dev/null 2>&1; then
            echo "tv.txt无更新，任务正常完成"
            exit 0
          fi
          git fetch origin main
          git reset --hard origin/main
          git add tv.txt
          git commit -m "流水线自动更新｜优选流媒体列表"
          git push origin main
          echo "文件推送仓库成功"
