name: stream-sort-task

# 触发规则：仅手动点击执行 + 每日凌晨2点定时，代码提交/文件修改不会自动运行
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  stream-sort-task:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 安装Python运行依赖（清华镜像+官方源兜底）
        run: |
          python3 -m pip install --upgrade pip
          pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          pip install requests m3u8

      - name: 列出当前目录文件校验
        run: ls -la

      - name: 仅执行分拣脚本
        run: |
          PYTHONUNBUFFERED=1 timeout 1800 python3 merge_speed.py
          echo "分拣脚本执行结束，校验tv.txt文件是否生成"
          ls -lh tv.txt
          tail -5 tv.txt

      - name: 磁盘同步+git提交（单独60秒超时，每步打印日志）
        timeout-minutes: 1
        run: |
          set -eo pipefail
          echo "1. 执行磁盘同步，确保tv.txt完整写入硬盘"
          sync
          sleep 2
          echo "2. 配置Git提交用户"
          git config --global user.name "wsc7758"
          git config --global user.email "xxx@shturl."
          echo "3. 将tv.txt加入暂存区"
          git add tv.txt
          echo "4. 判断文件是否存在变更"
          if git diff --cached --quiet; then
            echo "无更新，直接结束流程"
            exit 0
          fi
          echo "5. 拉取远端最新代码防止冲突"
          git fetch origin main
          git reset --hard origin/main
          git add tv.txt
          echo "6. 提交新版本tv.txt"
          git commit -m "流水线自动更新｜优选流媒体列表" || true
          echo "7. 推送tv.txt至远端仓库（限时60秒）"
          git push origin main
          echo "====tv.txt已成功上传至仓库===="
