name: stream-sort-task
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  stream-sort-task:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装Python依赖
        run: |
          python3 -m pip install --upgrade pip
          pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          pip install requests m3u8

      # 测速仅生成本地tv.txt，不复制到/tmp，彻底消除文件丢失问题
      - name: 测速生成本地tv.txt（独立子shell+exec释放句柄）
        timeout-minutes: 10
        run: |
          (
            PYTHONUNBUFFERED=1 python3 merge_speed.py
            sync
            sleep 1
            echo "测速完成，tv.txt已生成在工作目录"
            exec true
          )
          echo "测速子shell完全退出"

      # 直接读取本地tv.txt，无需复制临时文件，不会出现文件不存在报错
      - name: git提交推送本地tv.txt
        timeout-minutes: 1
        run: |
          set -eo pipefail
          sync
          sleep 0.5
          git config --global user.name "wsc7758"
          git config --global user.email "xxx@shturl."
          git add tv.txt
          if git diff --cached --quiet >/dev/null 2>&1; then
            echo "tv.txt无更新，任务正常完成"
            exit 0
          fi
          git fetch origin main
          git reset --hard origin/main
          git add tv.txt
          git commit -m "流水线自动更新｜优选流媒体列表"
          git push origin main
          echo "文件推送仓库成功"
