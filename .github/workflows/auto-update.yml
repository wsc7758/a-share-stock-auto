name: IPTV标准化流媒体分拣流水线
on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *'
    - cron: '0 10 * * *'

jobs:
  stream-sort-task:
    runs-on: ubuntu-latest
    timeout-minutes: 12  # 全局最大运行12分钟，卡死自动终止
    permissions:
      contents: write
    steps:
      - name: 拉取仓库完整代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置UTF-8系统编码，解决中文日志乱码
        run: |
          echo "LC_ALL=en_US.UTF-8" >> $GITHUB_ENV
          echo "LANG=en_US.UTF-8" >> $GITHUB_ENV
          echo "PYTHONIOENCODING=utf-8" >> $GITHUB_ENV

      - name: 配置国内公共DNS，优化国内源访问链路
        run: echo "nameserver 223.5.5.5" | sudo tee /etc/resolv.conf

      - name: 安装Python运行依赖（清华国内镜像）
        run: |
          python3 -m pip install --upgrade pip -i https://pypi.tuna.tsinghua.edu.cn/simple
          python3 -m pip install requests m3u8 -i https://pypi.tuna.tsinghua.edu.cn/simple

      - name: 执行标准化分拣流水线 merge_speed.py（无缓冲实时日志）
        run: python3 -u merge_speed.py  # -u 关闭stdout缓冲，立刻打印日志

      - name: 自动提交更新输出文件tv.txt
        run: |
          git config --global user.name "IPTV-Sort-Bot"
          git config --global user.email "auto-bot@iptv.local"
          git add tv.txt
          git diff --quiet && git diff --staged || (git commit -m "流水线自动更新｜官方源优先｜720P+大屏链路" && git push)
