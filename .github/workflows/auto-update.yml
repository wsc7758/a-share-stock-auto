name: IPTV自动更新
on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *'
    - cron: '0 10 * * *'
jobs:
  run_filter:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 拉取仓库全部代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: 配置国内DNS，优化访问国内链接速度
        run: |
          echo "nameserver 223.5.5.5" | sudo tee /etc/resolv.conf
      - name: 安装Python依赖（清华国内源，避免国外超时报错）
        run: |
          python3 -m pip install --upgrade pip -i https://pypi.tuna.tsinghua.edu.cn/simple
          python3 -m pip install requests m3u8 -i https://pypi.tuna.tsinghua.edu.cn/simple
      - name: 执行高清线路筛选脚本
        run: python3 merge_speed.py
      - name: 自动提交更新tv.txt（无线路变更不产生空提交）
        run: |
          git config --global user.name "IPTV-Bot"
          git config --global user.email "bot@github.com"
          git add tv.txt
          git diff --quiet && git diff --staged || (git commit -m "自动高清筛选｜咪咕央视频优先" && git push)
