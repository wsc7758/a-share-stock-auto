name: stream-sort-task
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  stream-sort-task:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装Python依赖
        run: |
          python3 -m pip install --upgrade pip
          pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          pip install requests m3u8

      # 测速+生成文件+提交推送 单步执行（新增后台异步杀进程，不阻塞主线程）
      - name: 测速+生成文件+提交推送 单步执行
        timeout-minutes: 12
        run: |
          set -eo pipefail
          # 后台启动异步清理任务，Python运行同时并行查杀残留进程
          (
            sleep 30
            pkill -9 -f python3 || true
            pkill -9 -f curl || true
            sync
          ) &
          CLEAN_PID=$!

          # 执行分拣脚本，不改动py文件任何代码
          PYTHONUNBUFFERED=1 python3 merge_speed.py
          sync
          sleep 0.5

          # 等待后台清理进程结束，确保socket全部释放
          wait $CLEAN_PID
          sync
          sleep 0.3

          # 下面全部git逻辑，串行执行
          git config --global user.name "wsc7758"
          git config --global user.email "xxx@shturl."
          git add tv.txt
          if git diff --cached --quiet >/dev/null 2>&1; then
            echo "tv.txt无内容更新，任务正常结束"
            exit 0
          fi
          git fetch origin main
          git reset --hard origin/main
          git add tv.txt
          git commit -m "流水线自动更新｜优选流媒体列表"
          git push origin main
          echo "文件推送仓库完成，全部流程结束"
