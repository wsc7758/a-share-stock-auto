name: stream-sort-task
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  stream-sort-task:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 系统内核调优，强制快速回收TCP连接（前置执行，根治残留socket）
        run: |
          sudo sysctl -w net.ipv4.tcp_fin_timeout=10
          sudo sysctl -w net.ipv4.tcp_tw_reuse=1
          sudo sysctl -w net.ipv4.tcp_tw_recycle=1
          sudo sysctl -w net.ipv4.tcp_orphan_retries=1

      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装Python依赖
        run: |
          python3 -m pip install --upgrade pip
          pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          pip install requests m3u8

      # 合并单步，内核参数限制socket最多10秒回收，不会长期阻塞bash
      - name: 测速+提交推送
        timeout-minutes: 4
        run: |
          set -eo pipefail
          PYTHONUNBUFFERED=1 python3 merge_speed.py
          sync
          pkill -9 -f python3 || true
          sync
          sleep 0.2
          git config --global user.name "wsc7758"
          git config --global user.email "xxx@shturl."
          git add tv.txt
          if git diff --cached --quiet >/dev/null 2>&1; then
            echo "无更新"
            exit 0
          fi
          git fetch origin main
          git reset --hard origin/main
          git add tv.txt
          git commit -m "流水线自动更新｜优选流媒体列表"
          git push origin main
