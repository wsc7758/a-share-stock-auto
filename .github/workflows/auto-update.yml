name: stream-sort-task
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  stream-sort-task:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装Python依赖
        run: |
          python3 -m pip install --upgrade pip
          pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          pip install requests m3u8

      # 测速+文件处理+git推送全部合并单一步骤，无步骤切换阻塞
      - name: 测速并直接提交推送（单步无跨步骤socket等待）
        timeout-minutes: 12
        run: |
          set -eo pipefail
          # 1. 执行分拣测速脚本
          PYTHONUNBUFFERED=1 python3 merge_speed.py
          sync
          sleep 0.5
          echo "测速完成，tv.txt已生成"

          # 2. git全套操作，同bash会话内执行，无需切换步骤
          git config --global user.name "wsc7758"
          git config --global user.email "xxx@shturl."
          git add tv.txt
          if git diff --cached --quiet >/dev/null 2>&1; then
            echo "tv.txt无更新，任务正常完成"
            exit 0
          fi
          git fetch origin main
          git reset --hard origin/main
          git add tv.txt
          git commit -m "流水线自动更新｜优选流媒体列表"
          git push origin main
          echo "文件推送仓库成功"
