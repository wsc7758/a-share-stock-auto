name: stream-sort-task
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  stream-sort-task:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装Python依赖
        run: |
          python3 -m pip install --upgrade pip
          pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          pip install requests m3u8

      - name: 测速+生成文件+提交推送 单步执行
        timeout-minutes: 12
        run: |
          set -eo pipefail
          # Python完全隔离在独立子shell，子shell结束自动回收全部网络线程
          (
            PYTHONUNBUFFERED=1 python3 merge_speed.py
            sync
            echo "Python测速子shell执行完毕"
          )
          # 子shell销毁后，无残留IO，直接向下执行git
          sync
          sleep 3

          git config --global user.name "wsc7758"
          git config --global user.email "xxx@shturl."
          git add tv.txt
          if git diff --cached --quiet >/dev/null 2>&1; then
            echo "tv.txt无内容更新，任务正常结束"
            exit 0
          fi
          git fetch origin main
          git reset --hard origin/main
          git add tv.txt
          git commit -m "流水线自动更新｜优选流媒体列表"
          git push origin main
          echo "文件推送仓库完成，全部流程结束"
